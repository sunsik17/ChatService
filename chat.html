<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket 채팅 테스트</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-shell { display: flex; height: 580px; width: 780px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }

    /* 사이드바 */
    .sidebar { width: 240px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fafafa; }
    .room-section-label { padding: 16px 14px 6px; font-size: 11px; font-weight: 600; color: #bbb; letter-spacing: 0.05em; }
    .room-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
    .room-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; }
    .room-item:hover { background: #efefef; }
    .room-item.active { background: #fff; color: #111; font-weight: 600; border: 1px solid #e0e0e0; }
    .room-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; flex-shrink: 0; transition: background 0.2s; }
    .room-item.active .room-dot { background: #1D9E75; }
    .room-name { flex: 1; }

    /* 메인 */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #ccc; font-size: 13px; }
    .empty-icon { font-size: 36px; margin-bottom: 4px; }

    .chat-view { display: none; flex-direction: column; height: 100%; }
    .chat-header { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .chat-header-left { display: flex; flex-direction: column; gap: 2px; }
    .chat-title { font-size: 15px; font-weight: 600; color: #111; }
    .chat-subtitle { font-size: 11px; color: #bbb; }
    .sender-row { display: flex; align-items: center; gap: 8px; }
    .sender-label { font-size: 12px; color: #888; }
    .sender-input { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid #ddd; background: #fafafa; color: #111; width: 100px; outline: none; }

    .connecting-bar { padding: 6px 16px; background: #fffbe6; border-bottom: 1px solid #ffe58f; font-size: 12px; color: #8a6a00; display: none; flex-shrink: 0; }
    .connecting-bar.show { display: block; }

    .msg-list { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg-empty { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 13px; color: #aaa; }
    .msg-bubble { display: flex; flex-direction: column; max-width: 70%; }
    .msg-bubble.mine { align-self: flex-end; align-items: flex-end; }
    .msg-bubble.theirs { align-self: flex-start; align-items: flex-start; }
    .msg-meta { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .msg-body { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-break: break-word; }
    .msg-bubble.mine .msg-body { background: #1D9E75; color: #fff; border-bottom-right-radius: 4px; }
    .msg-bubble.theirs .msg-body { background: #f0f0f0; color: #111; border-bottom-left-radius: 4px; }
    .msg-sys { font-size: 11px; color: #ccc; text-align: center; padding: 2px 0; }

    .input-row { padding: 10px 12px; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; }
    .msg-input { flex: 1; font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #111; outline: none; }
    .msg-input:focus { border-color: #aaa; }
    .msg-input:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send { padding: 0 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; font-size: 13px; }
    .btn-send:hover:not(:disabled) { background: #f0f0f0; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="chat-shell">
  <div class="sidebar">
    <div class="room-section-label">채팅방</div>
    <div class="room-list" id="roomList">
      <div class="room-item" data-room-id="room-1" data-room-title="참 박물관 동행 채팅방" onclick="enterRoom(this)">
        <span class="room-dot"></span><span class="room-name">참 박물관 동행 채팅방</span>
      </div>
      <div class="room-item" data-room-id="room-2" data-room-title="오행산 동행 채팅방" onclick="enterRoom(this)">
        <span class="room-dot"></span><span class="room-name">오행산 동행 채팅방</span>
      </div>
      <div class="room-item" data-room-id="room-3" data-room-title="호이안 올드타운 야경 동행 채팅방" onclick="enterRoom(this)">
        <span class="room-dot"></span><span class="room-name">호이안 올드타운 야경 동행 채팅방</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div>채팅방을 선택하면 자동으로 입장합니다</div>
    </div>

    <div class="chat-view" id="chatView">
      <div class="chat-header">
        <div class="chat-header-left">
          <span class="chat-title" id="chatTitle"></span>
          <span class="chat-subtitle" id="chatSubtitle"></span>
        </div>
        <div class="sender-row">
          <span class="sender-label">내 이름</span>
          <input class="sender-input" id="senderInput" value="나" />
        </div>
      </div>
      <div class="connecting-bar" id="connectingBar">⏳ 연결 중...</div>
      <div class="msg-list" id="msgList"></div>
      <div class="input-row">
        <input class="msg-input" id="msgInput" placeholder="메시지를 입력하세요..." disabled />
        <button class="btn-send" id="btnSend" disabled>전송</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── 서버 주소는 여기서 직접 수정 ──────────────────────
  const WS_URL = 'ws://localhost:8080/ws';

  let stompClient = null;
  let subscription = null;
  let currentRoomId = null;
  let isConnected = false;
  const messages = {};

  function enterRoom(el) {
    const roomId = el.dataset.roomId;
    const roomTitle = el.dataset.roomTitle;
    if (roomId === currentRoomId) return;

    document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    currentRoomId = roomId;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatTitle').textContent = roomTitle;
    document.getElementById('chatSubtitle').textContent = 'roomId: ' + roomId;

    setInputEnabled(false);
    renderMessages();

    if (isConnected) {
      resubscribe(roomId);
    } else {
      connectAndSubscribe(roomId);
    }
  }

  function connectAndSubscribe(roomId) {
    // 혹시 남아있는 기존 연결/구독 먼저 정리
    if (subscription) { subscription.unsubscribe(); subscription = null; }
    if (stompClient) { try { stompClient.disconnect(); } catch(e) {} stompClient = null; }
    isConnected = false;

    showConnectingBar(true);
    addSysMsg('서버에 연결 중...');
    try {
      const ws = new WebSocket(WS_URL);
      stompClient = Stomp.over(ws);
      stompClient.debug = null;
      stompClient.heartbeat.outgoing = 0;
      stompClient.heartbeat.incoming = 0;
      stompClient.connect({}, function () {
        isConnected = true;
        showConnectingBar(false);
        addSysMsg('연결 성공');
        resubscribe(roomId);
      }, function (err) {
        isConnected = false;
        showConnectingBar(false);
        addSysMsg('연결 실패 — ' + (typeof err === 'string' ? err : '서버를 확인해주세요.'));
      });
    } catch (e) {
      showConnectingBar(false);
      addSysMsg('오류: ' + e.message);
    }
  }

  function resubscribe(roomId) {
    if (subscription) { subscription.unsubscribe(); subscription = null; }
    const dest = '/sub/chatrooms/' + roomId;
    subscription = stompClient.subscribe(dest, function (frame) {
      try {
        const msg = JSON.parse(frame.body);
        if (!messages[roomId]) messages[roomId] = [];
        messages[roomId].push({ sender: msg.sender, content: msg.content, ts: new Date() });
        if (roomId === currentRoomId) renderMessages();
      } catch (e) { addSysMsg('메시지 파싱 오류'); }
    });
    addSysMsg(dest + ' 구독 시작');
    setInputEnabled(true);
    document.getElementById('msgInput').focus();
  }

  document.getElementById('btnSend').addEventListener('click', sendMsg);
  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendMsg(); }
  });

  let isSending = false;
  function sendMsg() {
    if (isSending) return;
    const content = document.getElementById('msgInput').value.trim();
    const sender = document.getElementById('senderInput').value.trim() || '나';
    if (!content || !stompClient || !isConnected) return;
    isSending = true;
    stompClient.send('/pub/chatrooms', {}, JSON.stringify({
      sender: sender,
      chatRoomId: currentRoomId,
      content: content
    }));
    document.getElementById('msgInput').value = '';
    setTimeout(() => { isSending = false; }, 100);
  }



  function setInputEnabled(on) {
    document.getElementById('msgInput').disabled = !on;
    document.getElementById('btnSend').disabled = !on;
  }

  function showConnectingBar(show) {
    document.getElementById('connectingBar').classList.toggle('show', show);
  }

  function addSysMsg(text) {
    const list = document.getElementById('msgList');
    const el = document.createElement('div');
    el.className = 'msg-sys';
    el.textContent = text;
    list.appendChild(el);
    list.scrollTop = list.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderMessages() {
    const list = document.getElementById('msgList');
    const myName = document.getElementById('senderInput').value.trim() || '나';
    const msgs = messages[currentRoomId] || [];
    list.innerHTML = '';
    if (!msgs.length) { list.innerHTML = '<div class="msg-empty">아직 메시지가 없습니다.</div>'; return; }
    msgs.forEach(function (m) {
      const isMine = m.sender === myName;
      const ts = m.ts.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      const wrap = document.createElement('div');
      wrap.className = 'msg-bubble ' + (isMine ? 'mine' : 'theirs');
      wrap.innerHTML =
        '<div class="msg-meta">' + (isMine ? ts : escHtml(m.sender) + ' · ' + ts) + '</div>' +
        '<div class="msg-body">' + escHtml(m.content) + '</div>';
      list.appendChild(wrap);
    });
    list.scrollTop = list.scrollHeight;
  }
</script>

</body>
</html>
