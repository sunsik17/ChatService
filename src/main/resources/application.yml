spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:h2:mem:the-commerce;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    database-platform: H2
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

server.port: 8080


